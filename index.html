<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Pangeia · Chamados</title>
<style>
:root{
  --roxo:#592C95;--roxo-esc:#3D1B6B;--roxo-cl:#AE76E5;
  --lav:#E4D4F9;--lav-l:#F5EEFB;--amarelo:#FFD23F;
  --txt:#2A1655;--txt-s:#6B5B8E;--brd:#D9C7F0;
  --ok:#0F6E56;--ok-bg:#dcfce7;--ok-txt:#166534;
  --warn:#854F0B;--warn-bg:#fef3c7;
  --bad:#A32D2D;--bad-bg:#fee2e2;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--lav-l);min-height:100vh;}
.topbar{background:linear-gradient(135deg,var(--roxo),var(--roxo-esc));padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(42,22,85,.3);display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;}
.brand{background:var(--amarelo);color:var(--roxo-esc);padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;}
.wrap{max-width:560px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:14px;border:1px solid var(--brd);padding:16px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(89,44,149,.06);}
.card-title{font-size:12px;font-weight:800;color:var(--roxo);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txt-s);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:var(--txt);background:#fff;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--roxo);}
.field textarea{resize:vertical;min-height:90px;}
.urg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.urg-btn{padding:12px 8px;border-radius:10px;border:2px solid var(--brd);background:#fff;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--txt-s);}
.urg-btn.sel-Alto{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.urg-btn.sel-Médio{border-color:#d97706;background:var(--warn-bg);color:#d97706;}
.urg-btn.sel-Baixo{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.foto-area{border:2px dashed var(--lav);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--lav-l);}
.foto-area:hover{border-color:var(--roxo);background:#fff;}
.fotos-prev{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.foto-item{position:relative;width:72px;height:72px;}
.foto-item img{width:100%;height:100%;border-radius:8px;object-fit:cover;}
.foto-del{position:absolute;top:-4px;right:-4px;background:var(--bad);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,var(--roxo),var(--roxo-esc));color:#fff;box-shadow:0 4px 14px rgba(89,44,149,.3);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.sucesso{display:none;background:var(--ok-bg);border:1px solid #86efac;border-radius:14px;padding:24px;text-align:center;margin-bottom:14px;}
.sucesso.show{display:block;}
.sucesso .num{font-size:48px;font-weight:900;color:var(--ok);line-height:1;}
.sucesso p{font-size:14px;color:var(--ok-txt);margin-top:8px;}
.loading-ov{position:fixed;inset:0;background:rgba(42,22,85,.6);z-index:400;display:none;align-items:center;justify-content:center;}
.loading-ov.show{display:flex;}
.loading-box{background:#fff;border-radius:14px;padding:28px 32px;text-align:center;min-width:200px;}
.spin{width:32px;height:32px;border:3px solid var(--lav);border-top-color:var(--roxo);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--roxo);color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="topbar">
  <h1><span class="brand">PANGEIA 96</span> Abrir Chamado</h1>
</div>
<div class="wrap">

  <div class="sucesso" id="sucesso">
    <div class="num" id="numGerado">—</div>
    <p>✅ Chamado aberto com sucesso!</p>
    <button class="btn btn-primary" style="margin-top:16px;" onclick="novoChamado()">➕ Novo chamado</button>
  </div>

  <div id="formulario">
    <div class="card">
      <div class="card-title">Novo chamado</div>

      <div class="field">
        <label>Grupo <span style="color:var(--bad)">*</span></label>
        <select id="grupo" onchange="carregarSubgrupos()"><option value="">Selecione o grupo...</option></select>
      </div>

      <div class="field">
        <label>Subgrupo <span style="color:var(--bad)">*</span></label>
        <select id="subgrupo"><option value="">Selecione o grupo primeiro...</option></select>
      </div>

      <div class="field">
        <label>Descrição do problema <span style="color:var(--bad)">*</span></label>
        <textarea id="descricao" rows="3" placeholder="Descreva o problema encontrado..."></textarea>
      </div>

      <div class="field">
        <label>Impacto <span style="color:var(--txt-s)">(opcional)</span></label>
        <textarea id="impacto" placeholder="Descreva o impacto do problema no sistema ou processo..."></textarea>
      </div>

      <div class="field">
        <label>Grau de urgência <span style="color:var(--bad)">*</span></label>
        <div class="urg-grid">
          <button class="urg-btn" onclick="selUrg('Alto',this)">🔴 Alto</button>
          <button class="urg-btn" onclick="selUrg('Médio',this)">🟡 Médio</button>
          <button class="urg-btn" onclick="selUrg('Baixo',this)">🟢 Baixo</button>
        </div>
        <input type="hidden" id="urgencia">
      </div>

      <div class="field">
        <label>Solicitante <span style="color:var(--bad)">*</span></label>
        <input type="text" id="solicitante" placeholder="Seu nome...">
      </div>

      <div class="field">
        <label>Área / Setor afetado <span style="color:var(--bad)">*</span></label>
        <select id="setor"><option value="">Carregando setores...</option></select>
      </div>

      <div class="field">
        <label>Registro fotográfico <span style="color:var(--txt-s)">(opcional · máx. 3 fotos)</span></label>
        <div class="foto-area" onclick="document.getElementById('fotoInput').click()">
          📷 Clique para adicionar fotos
        </div>
        <input type="file" id="fotoInput" accept="image/*" multiple style="display:none" onchange="adicionarFotos(this)">
        <div class="fotos-prev" id="fotosPrev"></div>
      </div>

      <button class="btn btn-primary" id="btnEnviar" onclick="enviarChamado()">
        📤 Abrir chamado
      </button>
    </div>
  </div>

</div>

<div class="loading-ov" id="loadingOv">
  <div class="loading-box">
    <div class="spin"></div>
    <div id="loadingTxt" style="font-size:13px;color:var(--txt-s);">Enviando...</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby7wEV4Fc2AB-Cs66znti0ES9Ghr95A9XNA2QkzjdMswaAtYNWlv-Rf4Y3OVY2yIp8F/exec';
var fotosParaEnviar = [];

window.addEventListener('load', function(){
  carregarGrupos();
  carregarSetores();
});

function chamarScript(params, cb){
  var url = SCRIPT_URL+'?'+Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&')+'&t='+Date.now();
  fetch(url).then(function(r){return r.json();}).then(cb)
    .catch(function(){cb({erro:'Erro de conexão'});});
}

var _gruposData = {};

function carregarGrupos(){
  chamarScript({acao:'grupos'}, function(d){
    if(d.erro||!d.grupos) return;
    _gruposData = d.grupos;
    var sel = document.getElementById('grupo');
    sel.innerHTML = '<option value="">Selecione o grupo...</option>'
      + Object.keys(d.grupos).map(function(g){
          return '<option>'+g+'</option>';
        }).join('');
  });
}

function carregarSubgrupos(){
  var grupo = document.getElementById('grupo').value;
  var sel = document.getElementById('subgrupo');
  var subs = _gruposData[grupo]||[];
  sel.innerHTML = '<option value="">Selecione o subgrupo...</option>'
    + subs.map(function(s){ return '<option>'+s+'</option>'; }).join('');
}

function carregarSetores(){
  chamarScript({acao:'setores'}, function(d){
    var sel = document.getElementById('setor');
    if(d.erro||!d.setores){sel.innerHTML='<option value="">Erro ao carregar</option>';return;}
    sel.innerHTML='<option value="">Selecione o setor...</option>'
      + d.setores.map(function(s){return'<option>'+s+'</option>';}).join('');
  });
}

function selUrg(val, btn){
  document.querySelectorAll('.urg-btn').forEach(function(b){b.className='urg-btn';});
  btn.className='urg-btn sel-'+val;
  document.getElementById('urgencia').value=val;
}

function adicionarFotos(input){
  var files=Array.from(input.files);
  var restante=3-fotosParaEnviar.length;
  if(restante<=0){toast('Máximo 3 fotos');return;}
  files.slice(0,restante).forEach(function(file){
    if(!file.type.startsWith('image/')){return;}
    fotosParaEnviar.push(file);
    var reader=new FileReader();
    reader.onload=function(e){
      var prev=document.getElementById('fotosPrev');
      var idx=fotosParaEnviar.indexOf(file);
      var div=document.createElement('div');
      div.className='foto-item';div.id='fp-'+idx;
      div.innerHTML='<img src="'+e.target.result+'"><button class="foto-del" onclick="removerFoto('+idx+')">×</button>';
      prev.appendChild(div);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function removerFoto(idx){
  fotosParaEnviar.splice(idx,1);
  var prev=document.getElementById('fotosPrev');
  prev.innerHTML='';
  fotosParaEnviar.forEach(function(f,i){
    var reader=new FileReader();
    reader.onload=function(e){
      var div=document.createElement('div');
      div.className='foto-item';div.id='fp-'+i;
      div.innerHTML='<img src="'+e.target.result+'"><button class="foto-del" onclick="removerFoto('+i+')">×</button>';
      prev.appendChild(div);
    };
    reader.readAsDataURL(f);
  });
}

function enviarChamado(){
  var grupo=document.getElementById('grupo').value;
  var subgrupo=document.getElementById('subgrupo').value;
  var descricao=document.getElementById('descricao').value.trim();
  var impacto=document.getElementById('impacto').value.trim();
  var urgencia=document.getElementById('urgencia').value;
  var solicitante=document.getElementById('solicitante').value.trim();
  var setor=document.getElementById('setor').value;
  if(!grupo||!subgrupo||!descricao||!urgencia||!solicitante||!setor){
    toast('Preencha todos os campos obrigatórios');return;
  }
  mostrarLoading('Enviando chamado...');
  uploadFotos(function(fotosIds){
    chamarScript({
      acao:'abrirChamado',
      dados:JSON.stringify({grupo:grupo,subgrupo:subgrupo,descricao:descricao,impacto:impacto,urgencia:urgencia,solicitante:solicitante,setor:setor,fotos:fotosIds})
    }, function(d){
      esconderLoading();
      if(d.ok){
        document.getElementById('numGerado').textContent='#'+d.numero;
        document.getElementById('sucesso').classList.add('show');
        document.getElementById('formulario').style.display='none';
      } else {toast('Erro: '+(d.erro||'desconhecido'));}
    });
  });
}

function uploadFotos(cb){
  if(!fotosParaEnviar.length){cb([]);return;}
  var ids=[], idx=0;
  function proximo(){
    if(idx>=fotosParaEnviar.length){cb(ids);return;}
    var file=fotosParaEnviar[idx];
    atualizarLoading('Comprimindo foto '+(idx+1)+'/'+fotosParaEnviar.length+'...');
    comprimirImagem(file, function(b64, mime, nome){
      if(!b64){toast('Foto '+(idx+1)+' muito grande, ignorada');idx++;proximo();return;}
      atualizarLoading('Enviando foto '+(idx+1)+'/'+fotosParaEnviar.length+'...');
      var CHUNK=30000, chunks=[], ci=0;
      for(var i=0;i<b64.length;i+=CHUNK) chunks.push(b64.substring(i,i+CHUNK));
      var uid='ch_'+Date.now()+'_'+idx;
      function envChunk(){
        if(ci>=chunks.length){
          chamarScript({acao:'finalizarFoto',dados:JSON.stringify({uploadId:uid,nome:nome,mime:mime,totalChunks:chunks.length}),t:Date.now()},
          function(d){if(d.ok&&d.id)ids.push(d.id);idx++;proximo();});
          return;
        }
        chamarScript({acao:'uploadChunk',dados:JSON.stringify({uploadId:uid,chunk:chunks[ci],idx:ci}),t:Date.now()+ci},
        function(d){if(d.ok){ci++;envChunk();}else{idx++;proximo();}});
      }
      envChunk();
    });
  }
  proximo();
}

function novoChamado(){
  document.getElementById('sucesso').classList.remove('show');
  document.getElementById('formulario').style.display='block';
  document.getElementById('grupo').selectedIndex=0;
  document.getElementById('subgrupo').innerHTML='<option value="">Selecione o grupo primeiro...</option>';
  document.getElementById('descricao').value='';
  document.getElementById('impacto').value='';
  document.getElementById('urgencia').value='';
  document.getElementById('solicitante').value='';
  document.getElementById('setor').selectedIndex=0;
  document.querySelectorAll('.urg-btn').forEach(function(b){b.className='urg-btn';});
  fotosParaEnviar=[];
  document.getElementById('fotosPrev').innerHTML='';
}

function mostrarLoading(txt){
  document.getElementById('loadingTxt').textContent=txt||'Enviando...';
  document.getElementById('loadingOv').classList.add('show');
  document.getElementById('btnEnviar').disabled=true;
}
function atualizarLoading(txt){document.getElementById('loadingTxt').textContent=txt;}
function esconderLoading(){
  document.getElementById('loadingOv').classList.remove('show');
  document.getElementById('btnEnviar').disabled=false;
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  setTimeout(function(){t.className='toast';},2800);
}

function comprimirImagem(file, cb){
  // Tenta createImageBitmap (mais leve, sem problema de EXIF no mobile)
  if(window.createImageBitmap){
    createImageBitmap(file, {resizeWidth:900, resizeHeight:900, resizeQuality:'medium'}).then(function(bmp){
      var canvas=document.createElement('canvas');
      canvas.width=bmp.width; canvas.height=bmp.height;
      canvas.getContext('2d').drawImage(bmp,0,0);
      bmp.close && bmp.close();
      cb(canvas.toDataURL('image/jpeg',0.65).split(',')[1],'image/jpeg',file.name.replace(/[.][^.]+$/,'.jpg'));
    }).catch(function(){ fallbackComprimir(file,cb); });
  } else {
    fallbackComprimir(file,cb);
  }
}

function fallbackComprimir(file, cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    var done=false;
    var t=setTimeout(function(){if(!done){done=true;cb(null);}},6000);
    img.onload=function(){
      clearTimeout(t);if(done)return;done=true;
      var MAX=900,w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.65).split(',')[1],'image/jpeg',file.name.replace(/[.][^.]+$/,'.jpg'));
    };
    img.onerror=function(){clearTimeout(t);if(!done){done=true;cb(null);}};
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function uploadFotos(cb){
  if(!fotosParaEnviar.length){cb([]);return;}
  var ids=[], idx=0;
  function proximo(){
    if(idx>=fotosParaEnviar.length){cb(ids);return;}
    var file=fotosParaEnviar[idx];
    atualizarLoading('Comprimindo foto '+(idx+1)+'/'+fotosParaEnviar.length+'...');
    comprimirImagem(file, function(b64, mime, nome){
      if(!b64){toast('Foto '+(idx+1)+' muito grande, ignorada');idx++;proximo();return;}
      atualizarLoading('Enviando foto '+(idx+1)+'/'+fotosParaEnviar.length+'...');
      var CHUNK=30000, chunks=[], ci=0;
      for(var i=0;i<b64.length;i+=CHUNK) chunks.push(b64.substring(i,i+CHUNK));
      var uid='ch_'+Date.now()+'_'+idx;
      function envChunk(){
        if(ci>=chunks.length){
          chamarScript({acao:'finalizarFoto',dados:JSON.stringify({uploadId:uid,nome:nome,mime:mime,totalChunks:chunks.length}),t:Date.now()},
          function(d){if(d.ok&&d.id)ids.push(d.id);idx++;proximo();});
          return;
        }
        chamarScript({acao:'uploadChunk',dados:JSON.stringify({uploadId:uid,chunk:chunks[ci],idx:ci}),t:Date.now()+ci},
        function(d){if(d.ok){ci++;envChunk();}else{idx++;proximo();}});
      }
      envChunk();
    });
  }
  proximo();
}

function novoChamado(){
  document.getElementById('sucesso').classList.remove('show');
  document.getElementById('formulario').style.display='block';
  document.getElementById('grupo').selectedIndex=0;
  document.getElementById('subgrupo').innerHTML='<option value="">Selecione o grupo primeiro...</option>';
  document.getElementById('descricao').value='';
  document.getElementById('impacto').value='';
  document.getElementById('urgencia').value='';
  document.getElementById('solicitante').value='';
  document.getElementById('setor').selectedIndex=0;
  document.querySelectorAll('.urg-btn').forEach(function(b){b.className='urg-btn';});
  fotosParaEnviar=[];
  document.getElementById('fotosPrev').innerHTML='';
}

function mostrarLoading(txt){
  document.getElementById('loadingTxt').textContent=txt||'Enviando...';
  document.getElementById('loadingOv').classList.add('show');
  document.getElementById('btnEnviar').disabled=true;
}
function atualizarLoading(txt){document.getElementById('loadingTxt').textContent=txt;}
function esconderLoading(){
  document.getElementById('loadingOv').classList.remove('show');
  document.getElementById('btnEnviar').disabled=false;
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show';
  setTimeout(function(){t.className='toast';},2800);
}
</script>
</body>
</html>
